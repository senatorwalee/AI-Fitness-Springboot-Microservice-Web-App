services:
  nginx:
    image: nginx:1.27-alpine
    container_name: aifitness-nginx
    restart: unless-stopped
    depends_on:
      gateway:
        condition: service_started
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  postgres:
    image: postgres:16
    container_name: aifitness-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fitness_user_db
      POSTGRES_USER: fitness
      POSTGRES_PASSWORD: fitness
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fitness -d fitness_user_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  mongodb:
    image: mongo:7
    container_name: aifitness-mongodb
    restart: unless-stopped
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    container_name: aifitness-rabbitmq
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  configserver:
    image: olawale99/configserver:latest
    pull_policy: always
    container_name: aifitness-configserver
    restart: unless-stopped
    environment:
      SERVER_PORT: 8080

  eureka:
    image: olawale99/eureka:latest
    pull_policy: always
    container_name: aifitness-eureka
    restart: unless-stopped
    environment:
      SERVER_PORT: 8080

  userservice:
    image: olawale99/userservice:latest
    pull_policy: always
    container_name: aifitness-userservice
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      configserver:
        condition: service_started
      eureka:
        condition: service_started
    environment:
      SERVER_PORT: 8080
      CONFIG_SERVER_URL: http://configserver:8080
      EUREKA_DEFAULT_ZONE: http://eureka:8080/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/fitness_user_db
      SPRING_DATASOURCE_USERNAME: fitness
      SPRING_DATASOURCE_PASSWORD: fitness
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver

  activityservice:
    image: olawale99/activityservice:latest
    pull_policy: always
    container_name: aifitness-activityservice
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      configserver:
        condition: service_started
      eureka:
        condition: service_started
    environment:
      SERVER_PORT: 8080
      MONGODB_URI: mongodb://mongodb:27017/fitnessactivity
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      EUREKA_DEFAULT_ZONE: http://eureka:8080/eureka/

  aiservice:
    image: olawale99/aiservice:latest
    pull_policy: always
    container_name: aifitness-aiservice
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      configserver:
        condition: service_started
      eureka:
        condition: service_started
    environment:
      SERVER_PORT: 8080
      MONGODB_URI: mongodb://mongodb:27017/fitnessrecommendations
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      EUREKA_DEFAULT_ZONE: http://eureka:8080/eureka/
      GEMINI_API_URL: ${GEMINI_API_URL:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}

  gateway:
    image: olawale99/gateway:latest
    pull_policy: always
    container_name: aifitness-gateway
    restart: unless-stopped
    depends_on:
      configserver:
        condition: service_started
      eureka:
        condition: service_started
      userservice:
        condition: service_started
      activityservice:
        condition: service_started
      aiservice:
        condition: service_started
    environment:
      SERVER_PORT: 8080
      CONFIG_SERVER_URL: http://configserver:8080
      EUREKA_DEFAULT_ZONE: http://eureka:8080/eureka/
      KEYCLOAK_ISSUER_URI: ${KEYCLOAK_ISSUER_URI:-http://host.docker.internal:8086/realms/fitness-oauth2}
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres-data:
  mongodb-data:
