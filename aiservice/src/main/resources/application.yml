spring:
  application:
    name: ai-service
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/fitnessrecommendations}
      database: fitnessrecommendations
      uuid-representation: standard
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

server:
  port: 8084
  error:
    include-message: always

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}

rabbitmq:
  exchange:
    name: fitness.exchange
  queue:
    name: activity.queue
  routing:
    key: activity.tracking

gemini:
  api:
    # Full Gemini API URL including the model endpoint and generateContent action
    # Format: https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent?key=
    url: ${GEMINI_API_URL}
    # API key for authenticating with the Gemini API
    key: ${GEMINI_API_KEY}
